name: Setup Check

# Runs on first push to verify the repository is properly configured
# Creates an issue with setup instructions if secrets are missing or invalid

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-setup:
    runs-on: self-hosted
    outputs:
      setup_complete: ${{ steps.check.outputs.setup_complete }}
      missing_secrets: ${{ steps.check.outputs.missing_secrets }}
      pat_issues: ${{ steps.check.outputs.pat_issues }}

    steps:
      - name: Check required secrets
        id: check
        env:
          HAI_GH_PAT: ${{ secrets.HAI_GH_PAT }}
          HEI_DOCKER_PAT: ${{ secrets.HEI_DOCKER_PAT }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          MISSING=""
          PAT_ISSUES=""
          SETUP_COMPLETE="true"

          # Check HAI_GH_PAT
          if [ -z "$HAI_GH_PAT" ]; then
            MISSING="${MISSING}HAI_GH_PAT,"
            SETUP_COMPLETE="false"
          else
            # Verify PAT has required permissions
            echo "Checking HAI_GH_PAT permissions..."

            # Test repo access
            REPO_ACCESS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $HAI_GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}")

            if [ "$REPO_ACCESS" != "200" ]; then
              PAT_ISSUES="${PAT_ISSUES}HAI_GH_PAT cannot access this repository (HTTP $REPO_ACCESS),"
              SETUP_COMPLETE="false"
            fi

            # Test issues write permission
            # We use a dry-run by checking the user's permissions on this repo
            PERMISSIONS=$(curl -s \
              -H "Authorization: token $HAI_GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}" | jq -r '.permissions // empty')

            if [ -z "$PERMISSIONS" ]; then
              PAT_ISSUES="${PAT_ISSUES}HAI_GH_PAT may not have sufficient permissions,"
              SETUP_COMPLETE="false"
            else
              CAN_PUSH=$(echo "$PERMISSIONS" | jq -r '.push // false')
              if [ "$CAN_PUSH" != "true" ]; then
                PAT_ISSUES="${PAT_ISSUES}HAI_GH_PAT does not have push access to this repository,"
                SETUP_COMPLETE="false"
              fi
            fi
          fi

          # Check HEI_DOCKER_PAT
          if [ -z "$HEI_DOCKER_PAT" ]; then
            MISSING="${MISSING}HEI_DOCKER_PAT,"
            SETUP_COMPLETE="false"
          fi

          # Check CLAUDE_CODE_OAUTH_TOKEN
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            MISSING="${MISSING}CLAUDE_CODE_OAUTH_TOKEN,"
            SETUP_COMPLETE="false"
          fi

          # Remove trailing commas
          MISSING="${MISSING%,}"
          PAT_ISSUES="${PAT_ISSUES%,}"

          echo "setup_complete=$SETUP_COMPLETE" >> $GITHUB_OUTPUT
          echo "missing_secrets=$MISSING" >> $GITHUB_OUTPUT
          echo "pat_issues=$PAT_ISSUES" >> $GITHUB_OUTPUT

          echo "Setup complete: $SETUP_COMPLETE"
          echo "Missing secrets: $MISSING"
          echo "PAT issues: $PAT_ISSUES"

  create-setup-issue:
    needs: check-setup
    if: needs.check-setup.outputs.setup_complete == 'false'
    runs-on: self-hosted

    steps:
      - name: Check if issue already exists
        id: check-existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "setup-required" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Setup issue already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create setup label
        if: steps.check-existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "setup-required" \
            --repo "${{ github.repository }}" \
            --color "d93f0b" \
            --description "Repository needs initial setup" 2>/dev/null || true

      - name: Create setup issue
        if: steps.check-existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MISSING_SECRETS: ${{ needs.check-setup.outputs.missing_secrets }}
          PAT_ISSUES: ${{ needs.check-setup.outputs.pat_issues }}
        run: |
          # Build missing secrets section
          MISSING_SECTION=""
          if [ -n "$MISSING_SECRETS" ]; then
            MISSING_SECTION="### Missing Secrets

          The following secrets need to be configured:

          "
            IFS=',' read -ra SECRETS <<< "$MISSING_SECRETS"
            for secret in "${SECRETS[@]}"; do
              case "$secret" in
                HAI_GH_PAT)
                  MISSING_SECTION="${MISSING_SECTION}- [ ] \`HAI_GH_PAT\` - GitHub Personal Access Token with \`repo\` scope
          "
                  ;;
                HEI_DOCKER_PAT)
                  MISSING_SECTION="${MISSING_SECTION}- [ ] \`HEI_DOCKER_PAT\` - Docker Hub PAT for pulling snail images
          "
                  ;;
                CLAUDE_CODE_OAUTH_TOKEN)
                  MISSING_SECTION="${MISSING_SECTION}- [ ] \`CLAUDE_CODE_OAUTH_TOKEN\` - Claude Code OAuth token
          "
                  ;;
              esac
            done
          fi

          # Build PAT issues section
          PAT_SECTION=""
          if [ -n "$PAT_ISSUES" ]; then
            PAT_SECTION="### Permission Issues

          The following issues were detected with your credentials:

          "
            IFS=',' read -ra ISSUES <<< "$PAT_ISSUES"
            for issue in "${ISSUES[@]}"; do
              PAT_SECTION="${PAT_SECTION}- ⚠️ ${issue}
          "
            done
          fi

          # Create the issue
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🔧 Setup Required: Configure Snail Agent Credentials" \
            --label "setup-required" \
            --body "$(cat <<EOF
          # Snail Agent Setup Required

          This repository was created from the snail-core-template but requires additional configuration before the agent can function.

          ${MISSING_SECTION}
          ${PAT_SECTION}

          ## Setup Instructions

          ### 1. Create a GitHub Personal Access Token (PAT)

          1. Go to [GitHub Settings > Developer settings > Personal access tokens](https://github.com/settings/tokens)
          2. Click **Generate new token (classic)**
          3. Give it a descriptive name (e.g., "Snail Agent - \${REPO_NAME}")
          4. Select the following scopes:
             - \`repo\` (Full control of private repositories)
             - \`workflow\` (Update GitHub Action workflows)
          5. Click **Generate token** and copy the token

          ### 2. Create a Docker Hub PAT

          1. Go to [Docker Hub > Account Settings > Security](https://hub.docker.com/settings/security)
          2. Click **New Access Token**
          3. Give it a descriptive name and select **Read-only** access
          4. Copy the token

          ### 3. Get Claude Code OAuth Token

          You need a long-lived OAuth token from Claude Code. To obtain it:

          1. Open Claude Code and authenticate
          2. Run the following command to extract your OAuth token:
             \`\`\`bash
             # On macOS/Linux
             cat ~/.claude/config.json | jq -r '.claudeAiOauth.accessToken'
             \`\`\`
          3. Copy the token value

          Contact your team lead or check the [Claude Code documentation](https://docs.anthropic.com/claude-code) for details.

          ### 4. Verify Organization Secrets

          For repositories under the \`heiervang-technologies\` organization, secrets should be configured at the **organization level** and will be inherited automatically.

          **Required organization secrets:**
          - \`HAI_GH_PAT\` - GitHub PAT with repo scope
          - \`HEI_DOCKER_PAT\` - Docker Hub PAT for pulling images
          - \`CLAUDE_CODE_OAUTH_TOKEN\` - Claude Code OAuth token

          If the secrets are missing or not accessible to this repository:
          1. Contact an organization admin to add/update the secrets
          2. Or go to [Organization Settings > Secrets](https://github.com/organizations/heiervang-technologies/settings/secrets/actions)
          3. Ensure the secrets have repository access enabled for this repo

          **Note:** Repository-level secrets can also be used as a fallback if needed.

          ### 5. Verify Setup

          After adding the secrets:
          1. Go to **Actions** tab
          2. Select **Setup Check** workflow
          3. Click **Run workflow**
          4. If successful, this issue will be closed automatically

          ---

          ## Customization

          Don't forget to customize the workflows for your agent:

          1. In \`.github/workflows/mention-trigger.yml\`:
             - Replace \`@marksverdhai\` with your agent's GitHub username
             - Update the \`agent_name\` parameter

          2. If you want assignment triggers:
             - Copy \`assignment-trigger.yml\` from the core repo
             - Update the assignee username filter

          ---

          *This issue was automatically created by the setup-check workflow.*
          EOF
          )"

  close-setup-issue:
    needs: check-setup
    if: needs.check-setup.outputs.setup_complete == 'true'
    runs-on: self-hosted

    steps:
      - name: Close any existing setup issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find and close any open setup issues
          ISSUES=$(gh issue list --repo "${{ github.repository }}" --label "setup-required" --state open --json number --jq '.[].number')

          for issue in $ISSUES; do
            gh issue close "$issue" \
              --repo "${{ github.repository }}" \
              --comment "✅ Setup verification passed! All required secrets are configured correctly.

          The snail agent is now ready to use. Try mentioning the agent in an issue to test it."
          done

          echo "Setup verification passed!"

name: Auto Tag Issues

# Automatically tags issues when they are opened or edited based on content
# Uses the reusable workflow from core to keep things DRY
#
# IMPORTANT: For production use, replace @main with a specific version tag (e.g., @v1.9.1)
# to ensure stability and prevent breaking changes from affecting your workflow.

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  auto-tag:
    uses: heiervang-technologies/core/.github/workflows/auto-tag-issues-reusable.yml@main
    with:
      issue_number: ${{ format('{0}', github.event.issue.number) }}
      issue_title: ${{ github.event.issue.title }}
      issue_body: ${{ github.event.issue.body }}
      label_config: '.github/auto-tag-config.yml'
      dry_run: false
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
